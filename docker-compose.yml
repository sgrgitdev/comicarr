services:
  comicarr:
    image: ghcr.io/frankieramirez/comicarr:latest
    container_name: comicarr
    ports:
      - "8090:8090"
    volumes:
      - ./config:/config
      - /path/to/comics:/comics
      - /path/to/manga:/manga
      - /path/to/downloads:/downloads
      # For Mylar3 migration (read-only, mount entire directory):
      # - /path/to/mylar3/config:/mylar3:ro
      # IMPORTANT: Mount the directory, not just the .db file (SQLite WAL needs sidecar files)
    environment:
      # Synology NAS defaults: PUID=1026, PGID=100
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      # Recommended for Docker Desktop on Windows bind mounts.
      # Native Linux storage can use WAL for better write concurrency.
      - COMICARR_SQLITE_JOURNAL_MODE=DELETE
    restart: unless-stopped
    stop_grace_period: 30s
