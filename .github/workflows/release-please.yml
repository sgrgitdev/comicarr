name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Sync uv.lock after release-please bumps pyproject.toml version.
  # This runs in the same workflow because GITHUB_TOKEN events don't
  # trigger other workflows — the standalone sync-uv-lock.yml never fired.
  sync-uv-lock:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Find release PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          BRANCH=$(
            gh pr list \
              --state open \
              --label "autorelease: pending" \
              --base main \
              --limit 1 \
              --json headRefName \
              --jq '.[0].headRefName // empty'
          )
          if [ -z "$BRANCH" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.pr.outputs.found == 'true'
        with:
          ref: ${{ steps.pr.outputs.branch }}

      - uses: astral-sh/setup-uv@v7
        if: steps.pr.outputs.found == 'true'

      - name: Sync uv.lock
        if: steps.pr.outputs.found == 'true'
        run: |
          uv lock
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --cached --quiet || git commit -m "chore: sync uv.lock with pyproject.toml version"
          git push

  docker-build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/frankieramirez/comicarr:latest
            ghcr.io/frankieramirez/comicarr:${{ needs.release-please.outputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=ghcr.io/frankieramirez/comicarr:buildcache
          cache-to: type=registry,ref=ghcr.io/frankieramirez/comicarr:buildcache,mode=max
